name: scheduled-extraction

on:
  schedule:
    # Runs at 02:00 UTC on the 1st of January and July (every 6 months)
    - cron: "0 2 1 1,7 *"
  workflow_dispatch:
    inputs:
      start_year:
        description: "Start year (default: 2015)"
        required: false
        default: "2015"
      max_per_query:
        description: "Max articles per query (0 = unlimited, 50 for smoke test)"
        required: false
        default: "0"
      dry_run:
        description: "Skip push to outputs repo (type true or false)"
        required: false
        default: "false"

jobs:
  extract:
    name: Extract — ${{ matrix.discipline }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      matrix:
        discipline: [stroke, neuroscience, neurology, cardiology]
      max-parallel: 2
      fail-fast: false

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          OPENALEX_MAILTO=${{ secrets.OPENALEX_MAILTO }}
          OPENALEX_API_KEY=${{ secrets.OPENALEX_API_KEY }}
          UNPAYWALL_EMAIL=${{ secrets.UNPAYWALL_EMAIL }}
          LLM_PROVIDER=openai
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_LLM_MODEL=gpt-4o-mini
          ENVEOF

      - name: Run extraction for ${{ matrix.discipline }}
        env:
          MAX_PER_QUERY: ${{ github.event.inputs.max_per_query || '0' }}
          START_YEAR: ${{ github.event.inputs.start_year || '2015' }}
        run: |
          ARGS="--disciplines ${{ matrix.discipline }} --start-year $START_YEAR --skip-dashboard"
          if [ "$MAX_PER_QUERY" != "0" ]; then
            ARGS="$ARGS --max-per-query $MAX_PER_QUERY --disable-api-enrich"
          fi
          python scripts/run_discipline_benchmark.py $ARGS

      - name: Upload discipline output
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ matrix.discipline }}
          path: data/benchmarks/${{ matrix.discipline }}/
          if-no-files-found: warn
          retention-days: 3

  dashboard-and-push:
    name: Dashboard and push
    needs: extract
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: always()

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download all discipline outputs
        uses: actions/download-artifact@v4
        with:
          pattern: output-*
          path: data/benchmarks/
          merge-multiple: false

      - name: Reorganize downloaded artifacts into discipline directories
        run: |
          for dir in data/benchmarks/output-*/; do
            discipline=$(basename "$dir" | sed 's/^output-//')
            mv "$dir" "data/benchmarks/$discipline"
          done

      - name: Build dashboard
        run: |
          INPUTS=""
          for discipline in stroke neuroscience neurology cardiology; do
            csv="data/benchmarks/$discipline/fully_enriched.csv"
            if [ -f "$csv" ]; then
              INPUTS="$INPUTS $discipline=$csv"
            fi
          done
          if [ -n "$INPUTS" ]; then
            python scripts/build_discipline_dashboard.py \
              --inputs $INPUTS \
              --out-dir data/benchmarks/dashboard
          else
            echo "No fully_enriched.csv files found; skipping dashboard."
          fi

      - name: Prepare outputs archive manifest
        run: python scripts/prepare_outputs_archive.py

      - name: Upload combined outputs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-outputs-${{ github.run_id }}
          path: |
            data/benchmarks/
            outputs_archive/
          retention-days: 30
          if-no-files-found: warn

      - name: Checkout outputs repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/checkout@v5
        with:
          repository: Friseeb/stroke_open_science_outputs
          token: ${{ secrets.OUTPUTS_REPO_PAT }}
          path: outputs_repo

      - name: Copy benchmark outputs to outputs repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H%M%SZ")
          DEST="outputs_repo/runs/${TIMESTAMP}"
          mkdir -p "$DEST"
          if [ -d "data/benchmarks" ]; then
            cp -r data/benchmarks/. "$DEST/"
          fi
          cp outputs_archive/manifest.csv "$DEST/manifest.csv" 2>/dev/null || true
          cp outputs_archive/metadata.json "$DEST/metadata.json" 2>/dev/null || true
          echo "$TIMESTAMP" > outputs_repo/LATEST_RUN.txt

      - name: Commit and push to outputs repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          cd outputs_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H%M%SZ")
            git commit -m "chore: automated benchmark run ${TIMESTAMP}"
            git push
          fi

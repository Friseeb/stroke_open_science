name: scheduled-extraction

on:
  schedule:
    # Runs at 02:00 UTC on the 1st of January and July (every 6 months)
    - cron: "0 2 1 1,7 *"
  workflow_dispatch:
    inputs:
      disciplines:
        description: "Space-separated discipline names to run (leave blank for all)"
        required: false
        default: ""
      max_per_query:
        description: "Max articles per query (0 = unlimited, use 50 for a smoke test)"
        required: false
        default: "0"
      dry_run:
        description: "Skip push to outputs repo (type true or false)"
        required: false
        default: "false"

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write .env from secrets
        run: |
          cat > .env <<'ENVEOF'
          OPENALEX_MAILTO=${{ secrets.OPENALEX_MAILTO }}
          OPENALEX_API_KEY=${{ secrets.OPENALEX_API_KEY }}
          UNPAYWALL_EMAIL=${{ secrets.UNPAYWALL_EMAIL }}
          LLM_PROVIDER=openai
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_LLM_MODEL=gpt-4o-mini
          ENVEOF

      - name: Run benchmark (all disciplines or specified subset)
        env:
          DISCIPLINES: ${{ github.event.inputs.disciplines }}
          MAX_PER_QUERY: ${{ github.event.inputs.max_per_query || '0' }}
        run: |
          ARGS=""
          if [ -n "$DISCIPLINES" ]; then
            ARGS="--disciplines $DISCIPLINES"
          fi
          if [ "$MAX_PER_QUERY" != "0" ]; then
            ARGS="$ARGS --max-per-query $MAX_PER_QUERY --disable-api-enrich"
          fi
          python scripts/run_discipline_benchmark.py $ARGS

      - name: Build dashboard
        run: python scripts/build_discipline_dashboard.py

      - name: Prepare outputs archive manifest
        run: python scripts/prepare_outputs_archive.py

      - name: Checkout outputs repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/checkout@v4
        with:
          repository: Friseeb/stroke_open_science_outputs
          token: ${{ secrets.OUTPUTS_REPO_PAT }}
          path: outputs_repo

      - name: Copy benchmark outputs to outputs repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H%M%SZ")
          DEST="outputs_repo/runs/${TIMESTAMP}"
          mkdir -p "$DEST"

          # Copy all CSVs and dashboards from data/benchmarks if they exist
          if [ -d "data/benchmarks" ]; then
            cp -r data/benchmarks/. "$DEST/"
          fi

          # Copy the outputs_archive manifest
          cp outputs_archive/manifest.csv "$DEST/manifest.csv" 2>/dev/null || true
          cp outputs_archive/metadata.json "$DEST/metadata.json" 2>/dev/null || true

          # Update the "latest" symlink-style pointer file
          echo "$TIMESTAMP" > outputs_repo/LATEST_RUN.txt

      - name: Commit and push to outputs repo
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          cd outputs_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H%M%SZ")
            git commit -m "chore: automated benchmark run ${TIMESTAMP}"
            git push
          fi

      - name: Upload outputs as workflow artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-outputs-${{ github.run_id }}
          path: |
            data/benchmarks/
            outputs_archive/
          retention-days: 30
          if-no-files-found: warn
